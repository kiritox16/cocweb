<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Clans Web - Babylon.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
        }
        
        #canvas {
            width: 100%;
            height: 100vh;
            display: block;
        }
        
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        /* Resources Display */
        .resources-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
            pointer-events: auto;
            min-width: 250px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        .resource-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;
        }
        
        .resource-icon {
            width: 30px;
            height: 30px;
            margin-right: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .gold-icon {
            background: #ffd700;
            color: #000;
        }
        
        .elixir-icon {
            background: #9d4edd;
            color: #fff;
        }
        
        .gem-icon {
            background: #06ff00;
            color: #000;
        }
        
        .resource-value {
            flex: 1;
            text-align: right;
            color: #ffd700;
        }
        
        /* Buildings Panel */
        .buildings-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            pointer-events: auto;
            border: 2px solid #ffd700;
            max-width: 300px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .buildings-panel h3 {
            color: #ffd700;
            margin-bottom: 15px;
            text-align: center;
            font-size: 18px;
        }
        
        .building-button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: linear-gradient(135deg, #ff6b00, #ff8c00);
            border: 2px solid #ffd700;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            pointer-events: auto;
        }
        
        .building-button:hover {
            background: linear-gradient(135deg, #ff8c00, #ffa500);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            transform: scale(1.05);
        }
        
        .building-button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .building-cost {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }
        
        /* Info Panel */
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
            pointer-events: auto;
            border: 2px solid #ffd700;
            max-width: 350px;
        }
        
        .info-panel h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .info-text {
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }
        
        /* Construction Timer */
        .construction-list {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            pointer-events: auto;
            border: 2px solid #ffd700;
            min-width: 250px;
        }
        
        .construction-list h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .construction-item {
            background: rgba(255, 215, 0, 0.1);
            padding: 10px;
            margin: 8px 0;
            border-left: 3px solid #ffd700;
            border-radius: 4px;
        }
        
        .construction-name {
            font-weight: bold;
            color: #ffd700;
        }
        
        .construction-time {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        
        /* Town Hall Level */
        .level-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 8px;
            border: 2px solid #ffd700;
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui-container">
        <!-- Resources Panel -->
        <div class="resources-panel">
            <div class="resource-item">
                <div class="resource-icon gold-icon">💰</div>
                <span>Oro:</span>
                <span class="resource-value" id="gold-value">0</span>
            </div>
            <div class="resource-item">
                <div class="resource-icon elixir-icon">⚡</div>
                <span>Elixir:</span>
                <span class="resource-value" id="elixir-value">0</span>
            </div>
            <div class="resource-item">
                <div class="resource-icon gem-icon">💎</div>
                <span>Gemas:</span>
                <span class="resource-value" id="gem-value">0</span>
            </div>
        </div>
        
        <!-- Town Hall Level -->
        <div class="level-display" id="level-display">
            Town Hall: Nivel 1
        </div>
        
        <!-- Buildings Panel -->
        <div class="buildings-panel">
            <h3>Construcciones</h3>
            <button class="building-button" id="build-gold-mine">
                Mina de Oro
                <div class="building-cost">Costo: 500 Oro</div>
            </button>
            <button class="building-button" id="build-elixir-collector">
                Colector de Elixir
                <div class="building-cost">Costo: 500 Oro</div>
            </button>
            <button class="building-button" id="build-cannon">
                Cañón
                <div class="building-cost">Costo: 1000 Oro + 500 Elixir</div>
            </button>
            <button class="building-button" id="build-archer-tower">
                Torre de Arquero
                <div class="building-cost">Costo: 2000 Oro + 1000 Elixir</div>
            </button>
            <button class="building-button" id="build-gold-storage">
                Almacén de Oro
                <div class="building-cost">Costo: 1000 Oro</div>
            </button>
            <button class="building-button" id="build-elixir-storage">
                Almacén de Elixir
                <div class="building-cost">Costo: 1000 Oro</div>
            </button>
            <button class="building-button" id="build-barracks">
                Cuartel
                <div class="building-cost">Costo: 3000 Oro + 2000 Elixir</div>
            </button>
        </div>
        
        <!-- Info Panel -->
        <div class="info-panel">
            <h3>ℹ️ Información</h3>
            <div class="info-text">
                <p><strong>Controles:</strong></p>
                <p>• Haz clic para seleccionar terreno</p>
                <p>• Botones abajo para construir</p>
                <p>• Zoom con rueda del ratón</p>
                <p><strong>Objetivo:</strong> Construye tu aldea</p>
            </div>
        </div>
        
        <!-- Construction Queue -->
        <div class="construction-list">
            <h3>En Construcción</h3>
            <div id="construction-queue"></div>
            <p style="font-size: 12px; color: #888; margin-top: 10px; text-align: center;">
                Cola vacía
            </p>
        </div>
    </div>

    <script type="module">
        import { initGame } from './src/index.js';
        
        initGame();
    </script>
</body>
</html>
